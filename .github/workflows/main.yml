name: Telegram Bot Runner

on:
  # تشغيل يدوي من واجهة GitHub
  workflow_dispatch:
  # أو جدولة كل 6 ساعات (حتى لا يتجاوز الحد الأقصى)
  schedule:
    - cron: '0 */6 * * *'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 ساعات كحد أقصى
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm install
        
      - name: Run Telegram Bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: node index.js
